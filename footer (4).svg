<svg width="100%" viewBox="0 0 1440 100" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    .p1 { animation: fly1 14s linear infinite; }
    .p2 { animation: fly2 20s linear infinite; animation-delay: -7s; }
    .p3 { animation: fly3 26s linear infinite; animation-delay: -13s; }
    .t1 { animation: fly1 14s linear infinite; }
    .t2 { animation: fly2 20s linear infinite; animation-delay: -7s; }
    .t3 { animation: fly3 26s linear infinite; animation-delay: -13s; }
    @keyframes fly1 {
      0%   { transform: translate(-100px, 2px); opacity: 0; }
      5%   { opacity: 1; }
      95%  { opacity: 1; }
      100% { transform: translate(1540px, -18px); opacity: 0; }
    }
    @keyframes fly2 {
      0%   { transform: translate(-100px, 0px); opacity: 0; }
      5%   { opacity: 1; }
      95%  { opacity: 1; }
      100% { transform: translate(1540px, 12px); opacity: 0; }
    }
    @keyframes fly3 {
      0%   { transform: translate(-100px, 0px); opacity: 0; }
      5%   { opacity: 1; }
      95%  { opacity: 1; }
      100% { transform: translate(1540px, -8px); opacity: 0; }
    }
  </style>

  <g id="pp">
    <polygon points="0,0 -26,9 -21,0 -26,-9" fill="white"/>
    <polygon points="-21,0 -26,9 -15,2" fill="rgba(255,255,255,0.5)"/>
    <polygon points="-21,0 -26,-9 -15,-2" fill="rgba(255,255,255,0.75)"/>
  </g>
</defs>

<!-- Plane 1 trail + plane — mid -->
<g class="t1">
  <line x1="-420" y1="60" x2="-2" y2="60"
    stroke="white" stroke-width="1.2" stroke-dasharray="6 7"
    stroke-linecap="round" opacity="0.4"/>
</g>
<g class="p1">
  <use href="#pp" x="0" y="60"/>
</g>

<!-- Plane 2 trail + plane — lower, smaller -->
<g class="t2">
  <line x1="-420" y1="76" x2="-2" y2="76"
    stroke="white" stroke-width="1" stroke-dasharray="5 8"
    stroke-linecap="round" opacity="0.32"/>
</g>
<g class="p2">
  <use href="#pp" x="0" y="76" transform="scale(0.78)"/>
</g>

<!-- Plane 3 trail + plane — higher, smallest -->
<g class="t3">
  <line x1="-420" y1="42" x2="-2" y2="42"
    stroke="white" stroke-width="0.8" stroke-dasharray="4 9"
    stroke-linecap="round" opacity="0.25"/>
</g>
<g class="p3">
  <use href="#pp" x="0" y="42" transform="scale(0.6)"/>
</g>

</svg>
